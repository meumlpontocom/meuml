version: 1
formatters:
  hiformat:
    format: 'HI %(asctime)s - %(name)s - %(levelname)s - %(message)s'
  simple:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: hiformat
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: simple
    filename: errors.log
  Payments:
    class: logging.FileHandler
    level: DEBUG
    formatter: simple
    filename: /var/log/meuml/files/Payments.log
  Auth:
    class: logging.FileHandler
    level: DEBUG
    formatter: simple
    filename: /var/log/meuml/files/Auth.log
  Account:
    class: logging.FileHandler
    level: DEBUG
    formatter: simple
    filename: /var/log/meuml/files/Account.log
loggers:
  console:
    level: DEBUG
    handlers: [console]
    propagate: no
  file:
    level: DEBUG
    handlers: [file]
    propagate: no
  Payments:
    level: DEBUG
    handlers: [Payments]
    propagate: no
  Auth:
    level: DEBUG
    handlers: [Auth]
    propagate: no
  Account:
    level: DEBUG
    handlers: [Account]
    propagate: no
root:
  level: DEBUG
  handlers: [console,file, Payments, Auth, Account]