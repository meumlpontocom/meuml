version: "3.2"
services:
  meumlv2-redis:
    container_name: meumlv2-redis
    image: redis:latest
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - source: meumlv2-redis
        target: /data
        type: volume
    build:
      context: ./redis
      args:
        REDIS_PASSWORD: "${REDIS_PASSWORD}"
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host

    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  flower:
    image: mher/flower:0.9.5
    environment:
      - broker_url=redis://:${REDIS_PASSWORD}@${REDIS_URL}:${REDIS_PORT}/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@${REDIS_URL}:${REDIS_PORT}/0
      - CELERY_BACKEND_URL=redis://:${REDIS_PASSWORD}@${REDIS_URL}:${REDIS_PORT}/0
      - FLOWER_PORT=9500
    command:
      [
        "flower",
        "--broker=redis://:${REDIS_PASSWORD}@${REDIS_URL}:${REDIS_PORT}/0",
        "--broker_api=redis://:${REDIS_PASSWORD}@${REDIS_URL}:${REDIS_PORT}/0",
        "--port=9500",
        "--basic_auth=${WEBMONITOR_USER1}:${WEBMONITOR_PASSWORD1}",
      ]
    ports:
      - "9500:9500"
volumes:
  meumlv2-redis:
